server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tb_synapse?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: adminSystemJwtSecretKey2024ForSpringBootApplication
  expiration: 86400000
  
logging:
  level:
    root: info
    com.admin: debug # 设置自己项目的包为 debug 级别
  file:
    name: logs/tb-synapse.log # 设置把日志输出到文件中
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
